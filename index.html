<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InAmigos Internship Tasks</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fffaf1;
        color: #171717;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      main {
        width: min(720px, calc(100% - 40px));
        padding: 36px;
        border: 2px solid #171717;
        border-radius: 12px;
        background: #fff;
        box-shadow: 8px 8px 0 #171717;
      }

      img {
        width: 72px;
        height: 72px;
        object-fit: contain;
        border-radius: 50%;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 24px;
        color: #646464;
        font-size: 1.05rem;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
        border: 2px solid #171717;
        border-radius: 999px;
        background: #171717;
        color: #fff;
        font-weight: 800;
        text-decoration: none;
        box-shadow: 5px 5px 0 rgba(23, 23, 23, 0.22);
      }
    </style>
  </head>
  <body>
    <main>
      <img src="./Task-1/assets/logo.jpg" alt="InAmigos Foundation logo" />
      <h1>InAmigos Internship Tasks</h1>
      <p>
        A collection of internship task submissions. More task folders can be
        added here later without changing existing task paths.
      </p>
      <a href="./Task-1/">Open Task 1</a>
    </main>
  </body>
</html>
